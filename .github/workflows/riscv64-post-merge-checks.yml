name: riscv64-post-merge-checks

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  modules-test-riscv64:
    strategy:
      matrix:
        module:
          - cli
          - cluster-api
          - dashboard
          - shared
    runs-on: ubuntu-24.04-riscv
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-go: "true"
      - name: Run tests
        working-directory: ./modules/${{ matrix.module }}
        run: go test ./...

  docker-builds:
    strategy:
      matrix:
        component:
          - cli
          - cluster-agent
          - cluster-api
          - dashboard
        target:
          - final
          - final-alpine
        include:
          - component: cli
            dockerfile: build/package/Dockerfile.cli
          - component: cluster-agent
            dockerfile: build/package/Dockerfile.cluster-agent
          - component: cluster-api
            dockerfile: build/package/Dockerfile.cluster-api
          - component: dashboard
            dockerfile: build/package/Dockerfile.dashboard
    runs-on: ubuntu-24.04-riscv
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.target }}-riscv64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.target }}-riscv64

  cli-builds:
    runs-on: ubuntu-24.04-riscv
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          setup-node: "true"
          setup-go: "true"
      - name: Build
        run: make build
